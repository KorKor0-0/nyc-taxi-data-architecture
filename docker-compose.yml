services:

  postgres:
    image: postgres:15
    container_name: postgres_nyc_taxi

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

      # เปลี่ยนจาก postgres → nyc_taxi_dw
      POSTGRES_DB: nyc_taxi_dw

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin"]
      interval: 10s
      retries: 5
      start_period: 5s

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres_init/init.sql:/docker-entrypoint-initdb.d/init.sql


  airflow-init:
    build: .

    # เพิ่ม container_name
    container_name: airflow_init

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres/airflow_db

      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark:/opt/airflow/spark
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username airflow
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@example.com
      --password airflow
      "


  airflow-webserver:
    build: .
    container_name: airflow_webserver

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres/airflow_db

      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    ports:
      - "8080:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark:/opt/airflow/spark
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs

    command: webserver


  airflow-scheduler:
    build: .
    container_name: airflow_scheduler

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres/airflow_db

      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark:/opt/airflow/spark
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs

    command: scheduler


volumes:
  postgres_data: